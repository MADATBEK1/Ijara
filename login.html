<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirish — IjaraGo | O'zbekiston Ijara Platformasi</title>
    <meta name="description"
        content="IjaraGo hisobingizga kiring. Ijara e'lonlarini boshqaring, band qiling va egalar bilan bog'laning." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://ijarego.uz/login.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="enhancements.css" />
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            animation: fade-up .5s ease both;
        }

        .input-icon-wrap {
            position: relative;
        }

        .input-icon-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 17px;
            pointer-events: none;
        }

        .input-icon-wrap input {
            padding-left: 42px;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 17px;
            background: none;
            border: none;
        }

        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
        }

        .remember-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--dark-3);
        }

        .remember-row a {
            color: var(--primary);
            font-weight: 600;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: white;
            font-family: var(--font);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--dark);
        }

        .social-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, .08);
        }

        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
        }
    </style>
</head>

<body>

    <a href="index.html" class="btn btn-ghost back-home">← Bosh sahifa</a>

    <div class="auth-card">
        <div class="auth-logo">
            <a href="index.html" class="logo" style="justify-content:center;">
                <span class="logo-icon" style="font-size:36px;">🏠</span>
                <span class="logo-text" style="font-size:28px;">IjaraGo</span>
            </a>
        </div>

        <h1 class="auth-title">Xush kelibsiz! 👋</h1>
        <p class="auth-subtitle">Hisobingizga kiring</p>

        <!-- Tab Switcher -->
        <div class="tab-switcher">
            <button class="tab-btn active" id="emailTab" onclick="switchTab('email')">📧 Email</button>
            <button class="tab-btn" id="phoneTab" onclick="switchTab('phone')">📱 Telefon</button>
        </div>

        <form id="loginForm" onsubmit="submitLogin(event)">
            <div class="form-group" id="emailGroup">
                <label>Email manzil</label>
                <div class="input-icon-wrap">
                    <span class="field-icon">📧</span>
                    <input type="email" id="emailInput" placeholder="misol@email.com" autocomplete="email" />
                </div>
            </div>

            <div class="form-group" id="phoneGroup" style="display:none;">
                <label>Telefon raqami</label>
                <div class="input-icon-wrap">
                    <span class="field-icon">📱</span>
                    <input type="tel" id="phoneInput" placeholder="+998 90 123 45 67" autocomplete="tel" />
                </div>
            </div>

            <div class="form-group">
                <label>Parol</label>
                <div class="input-icon-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="passwordInput" placeholder="Parolingizni kiriting"
                        autocomplete="current-password" />
                    <button type="button" class="password-toggle" id="eyeBtn" onclick="togglePassword()">👁️</button>
                </div>
            </div>

            <div class="remember-row" style="margin-bottom: 20px;">
                <label><input type="checkbox" id="rememberMe" style="accent-color:var(--primary);" /> Meni eslab
                    qol</label>
                <a href="#">Parolni unutdim?</a>
            </div>

            <button type="submit" class="btn btn-primary full-width btn-lg" id="loginBtn">
                Kirish →
            </button>
        </form>

        <div class="auth-divider">yoki</div>

        <div class="social-login">
            <button class="social-btn" id="googleLoginBtn" onclick="loginWithGoogle()" style="transition:all .3s ease;">
                <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="Google" />
                <span>Google orqali kirish</span>
                <span id="googleSpinner" style="display:none;">⏳</span>
            </button>
        </div>

        <p class="auth-switch">Hisobingiz yo'qmi? <a href="register.html">Ro'yxatdan o'ting</a></p>
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
            <a href="admin-login.html" id="adminLoginBtn"
                style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;background:linear-gradient(135deg,#1e1b4b,#312e81);color:white;font-size:15px;font-weight:700;border-radius:14px;text-decoration:none;transition:all .25s ease;box-shadow:0 4px 20px rgba(99,102,241,.35);letter-spacing:.3px;"
                onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 30px rgba(99,102,241,.5)'"
                onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 20px rgba(99,102,241,.35)'">
                <span style="font-size:22px;">🛡️</span>
                <span>Admin Kirish</span>
                <span
                    style="margin-left:auto;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;">ADMIN</span>
            </a>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="auth.js"></script>
    <script>
        function switchTab(type) {
            document.getElementById('emailGroup').style.display = type === 'email' ? 'block' : 'none';
            document.getElementById('phoneGroup').style.display = type === 'phone' ? 'block' : 'none';
            document.getElementById('emailTab').classList.toggle('active', type === 'email');
            document.getElementById('phoneTab').classList.toggle('active', type === 'phone');
        }

        function togglePassword() {
            const inp = document.getElementById('passwordInput');
            const btn = document.getElementById('eyeBtn');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
        }

        // Allaqachon kirgan bo'lsa — panel ga yo'naltirish
        (function () {
            const user = AUTH.getCurrentUser();
            if (user) {
                if (user.role === 'admin') { window.location.replace('admin.html'); return; }
                if (user.role === 'owner') { window.location.replace('owner-panel.html'); return; }
                window.location.replace('user-panel.html');
            }
        })();

        // Redirect manzilini aniqlash (sessionStorage + URL param)
        function getRedirect(defaultUrl) {
            // 1) sessionStorage.redirect_after_login (panel sahifasidan yo'naltirilgan)
            const stored = sessionStorage.getItem('redirect_after_login');
            if (stored) { sessionStorage.removeItem('redirect_after_login'); return stored; }
            // 2) URL ?redirect= parametri
            const r = new URLSearchParams(location.search).get('redirect');
            return r ? decodeURIComponent(r) : defaultUrl;
        }

        function doRedirect(user) {
            if (user.role === 'admin') { window.location.href = 'admin.html'; return; }
            if (user.role === 'owner') { window.location.href = getRedirect('owner-panel.html'); return; }
            window.location.href = getRedirect('user-panel.html');
        }

        function submitLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = '⏳ Tekshirilmoqda...';
            btn.disabled = true;

            const isPhone = document.getElementById('phoneGroup').style.display !== 'none';
            const email = document.getElementById('emailInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            setTimeout(() => {
                let result;
                if (isPhone) {
                    // Telefon orqali: email sifatida phone ishlatamiz
                    const users = AUTH.getUsers();
                    const user = users.find(u => u.phone === phone && u.password === password);
                    result = user ? AUTH.login(user.email, password) : { success: false, error: 'Telefon yoki parol noto\'g\'ri!' };
                } else {
                    result = AUTH.login(email, password);
                }

                if (result.success) {
                    showToast('Muvaffaqiyatli kirdingiz! ✅', 'success');
                    setTimeout(() => doRedirect(result.user), 900);
                } else {
                    showToast(result.error || 'Kirish xatosi!', 'info');
                    btn.textContent = 'Kirish →';
                    btn.disabled = false;
                }
            }, 700);
        }

        // Google demo login — avtomatik owner sessiya yaratadi
        function loginWithGoogle() {
            const btn = document.getElementById('googleLoginBtn');
            const spin = document.getElementById('googleSpinner');
            btn.disabled = true;
            btn.style.opacity = '0.75';
            spin.style.display = 'inline';

            setTimeout(() => {
                // Mavjud Google foydalanuvchini qidirish yoki yangi yaratish
                const users = AUTH.getUsers();
                let gUser = users.find(u => u.email === 'google.user@gmail.com');
                if (!gUser) {
                    const reg = AUTH.register({
                        firstName: 'Google',
                        lastName: 'Foydalanuvchi',
                        email: 'google.user@gmail.com',
                        phone: '+998901234567',
                        password: 'google_demo_2026',
                        role: 'owner',
                    });
                    gUser = reg.user;
                } else {
                    AUTH.setSession(gUser);
                }

                showToast('Google orqali kirdingiz! ✅', 'success');
                setTimeout(() => doRedirect(gUser), 900);
            }, 1200);
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = toast ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.add('show'); });
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
        }
    </script>

    <script src="support-chat.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Ro'yxatdan o'tish — IjaraGo | Bepul Ro'yxat</title>
    <meta name="description"
        content="IjaraGo'da bepul ro'yxatdan o'ting. Ijarachi yoki ega sifatida kirish imkoniyati. O'zbekistoning #1 ijara platformasi." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ijarego.uz/register.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="enhancements.css" />
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            max-width: 540px;
            animation: fade-up .5s ease both;
        }

        .role-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .role-card {
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg);
        }

        .role-card.selected {
            border-color: var(--primary);
            background: #eef2ff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, .12);
        }

        .role-card .role-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .role-card h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .role-card p {
            font-size: 11px;
            color: var(--gray);
        }

        .input-icon-wrap {
            position: relative;
        }

        .input-icon-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        .input-icon-wrap input {
            padding-left: 42px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .terms-check {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: var(--dark-3);
        }

        .terms-check input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .terms-check a {
            color: var(--primary);
            font-weight: 600;
        }

        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
        }

        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: var(--border);
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .3s ease, background .3s ease;
            width: 0%;
        }

        .strength-label {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 600;
        }

        /* ===== LANGUAGE SWITCHER (navbar ichida) ===== */
        .lang-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1.5px solid rgba(255, 255, 255, .18);
            background: rgba(255, 255, 255, .06);
            font-family: var(--font);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s ease;
            color: rgba(255, 255, 255, .65);
            letter-spacing: .3px;
        }

        .lang-btn .flag {
            font-size: 16px;
            line-height: 1;
        }

        .lang-btn .lang-text {
            color: inherit;
        }

        .lang-btn:hover {
            border-color: rgba(99, 102, 241, .7);
            background: rgba(99, 102, 241, .18);
            color: white;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border-color: transparent;
            box-shadow: 0 3px 12px rgba(99, 102, 241, .45);
        }
    </style>
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <nav
        style="position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(15,23,42,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08);padding:0 32px;height:58px;display:flex;align-items:center;justify-content:space-between;">

        <!-- Logo -->
        <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
            <span style="font-size:24px;">🏠</span>
            <span style="font-size:18px;font-weight:800;color:white;">IjaraGo</span>
        </a>

        <!-- Nav links + Language switcher yonma-yon -->
        <div style="display:flex;align-items:center;gap:6px;">
            <a href="index.html"
                style="color:rgba(255,255,255,.6);font-size:13px;font-weight:500;text-decoration:none;padding:6px 12px;border-radius:8px;transition:.2s;"
                onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,.6)'">Bosh
                sahifa</a>
            <a href="listings.html"
                style="color:rgba(255,255,255,.6);font-size:13px;font-weight:500;text-decoration:none;padding:6px 12px;border-radius:8px;transition:.2s;"
                onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,.6)'">E'lonlar</a>

            <!-- Ajratuvchi chiziq -->
            <div style="width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 6px;"></div>

            <!-- TIL TANLASH — nav yonida -->
            <button class="lang-btn active" id="langUZ" onclick="setLang('uz')" title="O'zbek tili">
                <span class="flag">🇺🇿</span>
                <span class="lang-text">UZ</span>
            </button>
            <button class="lang-btn" id="langEN" onclick="setLang('en')" title="English">
                <span class="flag">🇬🇧</span>
                <span class="lang-text">EN</span>
            </button>
            <button class="lang-btn" id="langRU" onclick="setLang('ru')" title="Русский">
                <span class="flag">🇷🇺</span>
                <span class="lang-text">RU</span>
            </button>
        </div>

        <!-- Auth tugmalar -->
        <div style="display:flex;align-items:center;gap:8px;">
            <a href="login.html"
                style="padding:8px 18px;border-radius:10px;border:1.5px solid rgba(255,255,255,.25);color:white;font-size:13px;font-weight:600;text-decoration:none;">Kirish</a>
        </div>
    </nav>

    <!-- Navbar balandligi uchun bo'sh joy -->
    <div style="height:58px;"></div>

    <div class="auth-card" style="margin-top:16px;">
        <div class="auth-logo">
            <a href="index.html" class="logo" style="justify-content:center;">
                <span class="logo-icon" style="font-size:32px;">🏠</span>
                <span class="logo-text" style="font-size:26px;">IjaraGo</span>
            </a>
        </div>

        <h1 class="auth-title" id="mainTitle">Hisob yaratish 🎉</h1>
        <p class="auth-subtitle" id="mainSubtitle">Quyida mos rolni tanlang</p>

        <!-- Role Selection -->
        <div class="role-cards">
            <div class="role-card selected" id="roleUser" onclick="selectRole('user')">
                <div class="role-icon">👤</div>
                <h4 id="roleUserTitle">Ijarachi</h4>
                <p id="roleUserDesc">Ijara olish uchun</p>
            </div>
            <div class="role-card" id="roleOwner" onclick="selectRole('owner')">
                <div class="role-icon">🏢</div>
                <h4 id="roleOwnerTitle">Ega</h4>
                <p id="roleOwnerDesc">Ijara berish uchun</p>
            </div>
        </div>

        <form onsubmit="submitRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label id="lblFirstName">Ism</label>
                    <div class="input-icon-wrap">
                        <span class="field-icon">👤</span>
                        <input type="text" id="inpFirstName" placeholder="Ismingiz" required />
                    </div>
                </div>
                <div class="form-group">
                    <label id="lblLastName">Familiya</label>
                    <div class="input-icon-wrap">
                        <span class="field-icon">👤</span>
                        <input type="text" id="inpLastName" placeholder="Familiyangiz" required />
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label id="lblPhone">Telefon raqami</label>
                <div class="input-icon-wrap">
                    <span class="field-icon">📱</span>
                    <input type="tel" id="inpPhone" placeholder="+998 90 000 00 00" required />
                </div>
            </div>

            <div class="form-group">
                <label id="lblEmail">Email manzil</label>
                <div class="input-icon-wrap">
                    <span class="field-icon">📧</span>
                    <input type="email" id="inpEmail" placeholder="misol@email.com" required />
                </div>
            </div>

            <div class="form-group">
                <label id="lblPassword">Parol</label>
                <div class="input-icon-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="regPassword" placeholder="Kamida 8 belgi" required
                        oninput="checkStrength(this.value)" />
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="form-group">
                <label id="lblConfirmPassword">Parolni tasdiqlang</label>
                <div class="input-icon-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="inpConfirmPass" placeholder="Parolni qayta kiriting" required />
                </div>
            </div>

            <!-- Owner extra -->
            <div id="ownerExtra" style="display:none;">
                <div class="form-group">
                    <label id="lblCompany">Kompaniya/Ism (ixtiyoriy)</label>
                    <div class="input-icon-wrap">
                        <span class="field-icon">🏢</span>
                        <input type="text" id="inpCompany" placeholder="Kompaniya nomi yoki to'liq ism" />
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-bottom:20px;">
                <label class="terms-check">
                    <input type="checkbox" required />
                    <span id="lblTerms">Men <a href="terms.html">Foydalanish shartlari</a> va <a
                            href="privacy.html">Maxfiylik siyosatini</a> qabul qilaman</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary full-width btn-lg" id="regBtn">
                Ro'yxatdan o'tish →
            </button>
        </form>

        <p class="auth-switch" id="loginSwitchText">
            Hisobingiz bormi? <a href="login.html" id="loginLink">Kirish</a>
        </p>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="auth.js"></script>
    <script>
        // =====================================================
        //  TARJIMALAR / TRANSLATIONS / ПЕРЕВОДЫ
        // =====================================================
        const TRANSLATIONS = {
            uz: {
                pageTitle: "Ro'yxatdan o'tish — IjaraGo",
                backBtn: "← Bosh sahifa",
                mainTitle: "Hisob yaratish 🎉",
                mainSubtitle: "Quyida mos rolni tanlang",
                roleUserTitle: "Ijarachi",
                roleUserDesc: "Ijara olish uchun",
                roleOwnerTitle: "Ega",
                roleOwnerDesc: "Ijara berish uchun",
                lblFirstName: "Ism",
                inpFirstName: "Ismingiz",
                lblLastName: "Familiya",
                inpLastName: "Familiyangiz",
                lblPhone: "Telefon raqami",
                inpPhone: "+998 90 000 00 00",
                lblEmail: "Email manzil",
                inpEmail: "misol@email.com",
                lblPassword: "Parol",
                inpPassword: "Kamida 8 belgi",
                lblConfirmPassword: "Parolni tasdiqlang",
                inpConfirmPass: "Parolni qayta kiriting",
                lblCompany: "Kompaniya/Ism (ixtiyoriy)",
                inpCompany: "Kompaniya nomi yoki to'liq ism",
                lblTerms: Men <a href="terms.html">Foydalanish shartlari</a> va <a href="privacy.html">Maxfiylik siyosatini</a> qabul qilaman`,
                regBtn: "Ro'yxatdan o'tish →",
                loginSwitchText: Hisobingiz bormi? <a href="login.html">Kirish</a>`,
                strength: ["Zaif 😟", "O'rta 😐", "Yaxshi 👍", "Juda kuchli 💪"],
                toastSuccess: "Muvaffaqiyatli ro'yxatdan o'tdingiz! ✅",
                toastLoading: "⏳ Ro'yxatdan o'tilmoqda...",
            },
            en: {
                pageTitle: "Register — IjaraGo",
                backBtn: "← Home",
                mainTitle: "Create Account 🎉",
                mainSubtitle: "Select your role below",
                roleUserTitle: "Renter",
                roleUserDesc: "For renting items",
                roleOwnerTitle: "Owner",
                roleOwnerDesc: "For listing items",
                lblFirstName: "First Name",
                inpFirstName: "Your first name",
                lblLastName: "Last Name",
                inpLastName: "Your last name",
                lblPhone: "Phone Number",
                inpPhone: "+1 000 000 0000",
                lblEmail: "Email Address",
                inpEmail: "example@email.com",
                lblPassword: "Password",
                inpPassword: "At least 8 characters",
                lblConfirmPassword: "Confirm Password",
                inpConfirmPass: "Re-enter your password",
                lblCompany: "Company / Name (optional)",
                inpCompany: "Company name or full name",
                lblTerms: I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>`,
                regBtn: "Create Account →",
                loginSwitchText: Already have an account? <a href="login.html">Sign In</a>`,
                strength: ["Weak 😟", "Fair 😐", "Good 👍", "Strong 💪"],
                toastSuccess: "Account created successfully! ✅",
                toastLoading: "⏳ Creating account...",
            },
            ru: {
                pageTitle: "Регистрация — IjaraGo",
                backBtn: "← Главная",
                mainTitle: "Создать аккаунт 🎉",
                mainSubtitle: "Выберите вашу роль ниже",
                roleUserTitle: "Арендатор",
                roleUserDesc: "Для аренды вещей",
                roleOwnerTitle: "Владелец",
                roleOwnerDesc: "Для сдачи в аренду",
                lblFirstName: "Имя",
                inpFirstName: "Ваше имя",
                lblLastName: "Фамилия",
                inpLastName: "Ваша фамилия",
                lblPhone: "Номер телефона",
                inpPhone: "+7 000 000 0000",
                lblEmail: "Email адрес",
                inpEmail: "пример@email.com",
                lblPassword: "Пароль",
                inpPassword: "Минимум 8 символов",
                lblConfirmPassword: "Подтвердите пароль",
                inpConfirmPass: "Введите пароль ещё раз",
                lblCompany: "Компания / Имя (необязательно)",
                inpCompany: "Название компании или полное имя",
                lblTerms: Я согласен с <a href="terms.html">Условиями использования</a> и <a href="privacy.html">Политикой конфиденциальности</a>`,
                regBtn: "Зарегистрироваться →",
                loginSwitchText: Уже есть аккаунт? <a href="login.html">Войти</a>`,
                strength: ["Слабый 😟", "Средний 😐", "Хороший 👍", "Надёжный 💪"],
                toastSuccess: "Аккаунт успешно создан! ✅",
                toastLoading: "⏳ Регистрация...",
            }
        };

        let currentLang = 'uz';
        let currentStrengths = TRANSLATIONS.uz.strength;

        // =====================================================
        //  TIL O'ZGARTIRISH
        // =====================================================
        function setLang(lang) {
            currentLang = lang;
            const T = TRANSLATIONS[lang];
            currentStrengths = T.strength;

            // Til tugmalarini yangilash
            ['UZ', 'EN', 'RU'].forEach(l => {
                document.getElementById('lang' + l).classList.toggle('active', l.toLowerCase() === lang);
            });

            // HTML lang atributi
            document.documentElement.lang = lang;

            // Sahifa sarlavhasi
            document.getElementById('pageTitle').textContent = T.pageTitle;

            // Oddiy matn elementlari
            const textIds = ['backBtn', 'mainTitle', 'mainSubtitle', 'roleUserTitle', 'roleUserDesc',
                'roleOwnerTitle', 'roleOwnerDesc', 'lblFirstName', 'lblLastName',
                'lblPhone', 'lblEmail', 'lblPassword', 'lblConfirmPassword',
                'lblCompany', 'regBtn'];
            textIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = T[id];
            });

            // HTML o'z ichiga oluvchi elementlar
            const htmlIds = ['lblTerms', 'loginSwitchText'];
            htmlIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = T[id];
            });

            // Placeholder larni yangilash
            const placeholders = {
                inpFirstName: T.inpFirstName,
                inpLastName: T.inpLastName,
                inpPhone: T.inpPhone,
                inpEmail: T.inpEmail,
                regPassword: T.inpPassword,
                inpConfirmPass: T.inpConfirmPass,
                inpCompany: T.inpCompany,
            };
            for (const [id, ph] of Object.entries(placeholders)) {
                const el = document.getElementById(id);
                if (el) el.placeholder = ph;
            }

            // Parol kuchi labelini yangilash
            const strengthLabel = document.getElementById('strengthLabel');
            if (strengthLabel && strengthLabel.textContent) {
                // recalc if password exists
                const pw = document.getElementById('regPassword').value;
                if (pw) checkStrength(pw);
            }

            // Toast xabari (agar ko'rinishda bo'lsa)
            showToast(`🌐 ${lang === 'uz' ? "O'zbek" : lang === 'en' ? 'English' : 'Русский'} tilida!`, 'info');
        }

        // =====================================================
        //  ROL TANLASH
        // =====================================================
        let selectedRole = 'user';
        function selectRole(role) {
            selectedRole = role;
            document.getElementById('roleUser').classList.toggle('selected', role === 'user');
            document.getElementById('roleOwner').classList.toggle('selected', role === 'owner');
            document.getElementById('ownerExtra').style.display = role === 'owner' ? 'block' : 'none';
        }

        // =====================================================
        //  PAROL KUCHI TEKSHIRISH
        // =====================================================
        function checkStrength(val) {
            const fill = document.getElementById('strengthFill');
            const label = document.getElementById('strengthLabel');
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const colors = ['#f43f5e', '#f59e0b', '#3b82f6', '#10b981'];
            const widths = ['25%', '50%', '75%', '100%'];
            const idx = Math.max(0, score - 1);
            fill.style.width = val ? widths[idx] : '0%';
            fill.style.background = colors[idx];
            label.textContent = val ? currentStrengths[idx] : '';
            label.style.color = colors[idx];
        }

        // =====================================================
        //  RO'YXATDAN O'TISH
        // =====================================================
        function submitRegister(e) {
            e.preventDefault();
            const T = TRANSLATIONS[currentLang];
            const btn = document.getElementById('regBtn');
            btn.textContent = T.toastLoading;
            btn.disabled = true;

            const pass = document.getElementById('regPassword').value;
            const confirm = document.getElementById('inpConfirmPass').value;
            if (pass !== confirm) {
                showToast('Parollar mos kelmaydi!', 'info');
                btn.textContent = T.regBtn;
                btn.disabled = false;
                return;
            }

            const result = AUTH.register({
                firstName: document.getElementById('inpFirstName').value.trim(),
                lastName: document.getElementById('inpLastName').value.trim(),
                email: document.getElementById('inpEmail').value.trim(),
                phone: document.getElementById('inpPhone').value.trim(),
                password: pass,
                role: selectedRole,
            });

            setTimeout(() => {
                if (result.success) {
                    showToast(T.toastSuccess, 'success');
                    setTimeout(() => {
                        window.location.href = selectedRole === 'owner' ? 'add-listing.html' : 'user-panel.html';
                    }, 1200);
                } else {
                    showToast(result.error || 'Xatolik yuz berdi!', 'info');
                    btn.textContent = T.regBtn;
                    btn.disabled = false;
                }
            }, 800);
        }

        // =====================================================
        //  TOAST
        // =====================================================
        function showToast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = toast ${type}`;
            t.textContent = msg;
            c.appendChild(t);
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
        }
    </script>

    <script src="support-chat.js"></script>
</body>

</html>

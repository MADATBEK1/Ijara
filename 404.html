<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Sahifa topilmadi | IjaraGo</title>
    <meta name="description" content="Kechirasiz, siz qidirayotgan sahifa topilmadi." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="enhancements.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            overflow: hidden;
            position: relative;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .25;
            animation: blob-move 8s ease-in-out infinite;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: #6366f1;
            top: -150px;
            left: -150px;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #f59e0b;
            bottom: -100px;
            right: -100px;
            animation-direction: reverse;
            animation-duration: 11s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #10b981;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 6s;
        }

        @keyframes blob-move {

            0%,
            100% {
                transform: scale(1) translate(0, 0);
            }

            33% {
                transform: scale(1.1) translate(20px, -20px);
            }

            66% {
                transform: scale(.9) translate(-20px, 20px);
            }
        }

        .error-wrap {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
        }

        .error-number {
            font-size: clamp(100px, 20vw, 200px);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #a5b4fc, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0;
            animation: pulse-scale 3s ease-in-out infinite;
        }

        @keyframes pulse-scale {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.04);
            }
        }

        .error-emoji {
            font-size: 60px;
            display: block;
            margin-bottom: 12px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .error-title {
            font-size: clamp(22px, 4vw, 32px);
            font-weight: 800;
            color: white;
            margin-bottom: 12px;
        }

        .error-desc {
            color: rgba(255, 255, 255, .65);
            font-size: 16px;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all .3s ease;
            text-decoration: none;
        }

        .btn-home.primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 8px 30px rgba(99, 102, 241, .4);
        }

        .btn-home.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, .5);
        }

        .btn-home.ghost {
            background: rgba(255, 255, 255, .1);
            color: white;
            border: 2px solid rgba(255, 255, 255, .25);
            backdrop-filter: blur(10px);
        }

        .btn-home.ghost:hover {
            background: rgba(255, 255, 255, .2);
        }

        .quick-links {
            margin-top: 48px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-link {
            color: rgba(255, 255, 255, .5);
            font-size: 13px;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, .15);
            transition: all .2s ease;
        }

        .quick-link:hover {
            color: white;
            border-color: rgba(255, 255, 255, .4);
            background: rgba(255, 255, 255, .08);
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="error-wrap">
        <span class="error-emoji">🏠</span>
        <div class="error-number">404</div>
        <h1 class="error-title">Sahifa topilmadi</h1>
        <p class="error-desc">
            Kechirasiz, siz qidirayotgan sahifa mavjud emas yoki ko'chirilgan bo'lishi mumkin.
            Bosh sahifaga qaytib, kerakli narsangizni toping.
        </p>
        <div class="error-actions">
            <a href="index.html" class="btn-home primary">🏠 Bosh sahifaga</a>
            <a href="listings.html" class="btn-home ghost">📋 E'lonlar</a>
        </div>
        <div class="quick-links">
            <a href="categories.html" class="quick-link">Kategoriyalar</a>
            <a href="how-it-works.html" class="quick-link">Qanday ishlaydi</a>
            <a href="faq.html" class="quick-link">FAQ</a>
            <a href="contact.html" class="quick-link">Aloqa</a>
        </div>
    </div>
</body>

</html>
